<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>7v7 Match Ratings</title>

<style>

body{
margin:0;
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
}

.header{
display:flex;
justify-content:center;
align-items:center;
gap:25px;
margin:20px;
flex-wrap:wrap;
}

.team{
font-size:22px;
font-weight:bold;
}

.score{
font-size:26px;
font-weight:bold;
}

.field{
width:90vw;
max-width:720px;
height:1000px;
margin:auto;
background:linear-gradient(#1f7a3d 50%, #166534 50%);
border:5px solid white;
border-radius:10px;
position:relative;
}

.field:after{
content:"";
position:absolute;
top:50%;
width:100%;
height:3px;
background:white;
}

.player{
width:80px;
height:80px;
border-radius:50%;
position:absolute;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:bold;
border:3px solid white;
cursor:pointer;
}

.rating{
font-size:18px;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
align-items:center;
justify-content:center;
}

.box{
background:#1e293b;
padding:25px;
border-radius:10px;
width:320px;
}

input{
width:100%;
padding:6px;
margin:6px 0;
}

button{
padding:8px 14px;
background:#3b82f6;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

.controls{
margin:20px;
}

</style>
</head>

<body>

<div class="header">

<div class="team" id="teamA">Team A</div>

<div class="score">
<span id="scoreA">0</span> - <span id="scoreB">0</span>
</div>

<div class="team" id="teamB">Team B</div>

</div>

<div class="controls">
<button onclick="exportImage()">Export Lineup</button>
</div>

<div class="field" id="field"></div>

<div class="modal" id="modal">
<div class="box">

<h2 id="pName"></h2>

<div id="viewStats"></div>

<div id="editArea" style="display:none">

Name
<input id="editName">

Rating
<input id="editRating" type="number" step="0.1">

Goals
<input id="editGoals" type="number">

Assists
<input id="editAssists" type="number">

<button onclick="savePlayer()">Save</button>

</div>

<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

const password="soccer123"
let admin=false

let data = JSON.parse(localStorage.getItem("matchData"))

if(!data){

data={
teamA:"Team A",
teamB:"Team B",
scoreA:0,
scoreB:0,

players:[

{name:"GK A",rating:7.4,goals:0,assists:0,x:320,y:900},

{name:"LB A",rating:7.8,goals:0,assists:1,x:120,y:740},
{name:"CB A",rating:7.1,goals:0,assists:0,x:320,y:760},
{name:"RB A",rating:7.0,goals:0,assists:0,x:520,y:740},

{name:"LM A",rating:8.3,goals:1,assists:1,x:180,y:560},
{name:"RM A",rating:8.1,goals:0,assists:2,x:460,y:560},

{name:"ST A",rating:9.2,goals:2,assists:0,x:200,y:420},

{name:"GK B",rating:6.8,goals:0,assists:0,x:320,y:60},

{name:"LB B",rating:7.3,goals:0,assists:0,x:120,y:200},
{name:"CB B",rating:7.0,goals:0,assists:0,x:320,y:180},
{name:"RB B",rating:6.9,goals:0,assists:0,x:520,y:200},

{name:"LM B",rating:7.5,goals:0,assists:1,x:180,y:380},
{name:"RM B",rating:7.7,goals:1,assists:0,x:460,y:380},

{name:"ST B",rating:8.6,goals:1,assists:0,x:440,y:520}

]

}

}

function saveData(){
localStorage.setItem("matchData",JSON.stringify(data))
}

function ratingColor(r){

if(r>=9)return"#16a34a"
if(r>=8)return"#22c55e"
if(r>=7)return"#eab308"
if(r>=6)return"#f97316"
return"#dc2626"

}

const field=document.getElementById("field")

function render(){

field.innerHTML=""

teamA.innerText=data.teamA
teamB.innerText=data.teamB

scoreA.innerText=data.scoreA
scoreB.innerText=data.scoreB

data.players.forEach((p,i)=>{

let div=document.createElement("div")

div.className="player"

div.style.left=p.x+"px"
div.style.top=p.y+"px"

div.style.background=ratingColor(p.rating)

div.innerHTML=`
<div>${p.name}</div>
<div class="rating">${p.rating}</div>
`

div.onclick=()=>openPlayer(i)

if(admin){

div.draggable=true

div.ondragend=(e)=>{

p.x=e.pageX-field.offsetLeft-40
p.y=e.pageY-field.offsetTop-40

saveData()
render()

}

}

field.appendChild(div)

})

}

let current=null

function openPlayer(i){

current=i

let p=data.players[i]

pName.innerText=p.name

viewStats.innerHTML=`
Goals: ${p.goals}<br>
Assists: ${p.assists}<br>
Rating: ${p.rating}
`

if(admin){

editArea.style.display="block"

editName.value=p.name
editRating.value=p.rating
editGoals.value=p.goals
editAssists.value=p.assists

}else{

editArea.style.display="none"

}

modal.style.display="flex"

}

function savePlayer(){

let p=data.players[current]

p.name=editName.value
p.rating=parseFloat(editRating.value)
p.goals=parseInt(editGoals.value)
p.assists=parseInt(editAssists.value)

saveData()

render()

closeModal()

}

function closeModal(){
modal.style.display="none"
}

document.addEventListener("keydown",e=>{

if(e.shiftKey && e.key==="E"){

let pass=prompt("Admin Password")

if(pass===password){

admin=true

let newA=prompt("Team A name",data.teamA)
if(newA)data.teamA=newA

let newB=prompt("Team B name",data.teamB)
if(newB)data.teamB=newB

let sA=prompt("Score A",data.scoreA)
let sB=prompt("Score B",data.scoreB)

data.scoreA=parseInt(sA)
data.scoreB=parseInt(sB)

saveData()

alert("Edit mode enabled")

render()

}

}

})

function exportImage(){

html2canvas(document.body).then(canvas=>{

let link=document.createElement("a")

link.download="lineup.png"

link.href=canvas.toDataURL()

link.click()

})

}

render()

</script>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</body>
</html>
```
