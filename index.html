<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>7v7 Match Ratings</title>

<style>
body{
margin:0;
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
}

h1{
margin:20px;
}

.field{
width:720px;
height:1000px;
margin:auto;
background:linear-gradient(#1f7a3d 50%, #166534 50%);
border:5px solid white;
border-radius:10px;
position:relative;
box-shadow:0 0 25px black;
}

.field:after{
content:"";
position:absolute;
top:50%;
left:0;
width:100%;
height:3px;
background:white;
}

.player{
width:80px;
height:80px;
border-radius:50%;
position:absolute;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:13px;
font-weight:bold;
border:3px solid white;
cursor:pointer;
transition:0.2s;
}

.player:hover{
transform:scale(1.08);
}

.rating{
font-size:18px;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
align-items:center;
justify-content:center;
}

.modalBox{
background:#1e293b;
padding:25px;
border-radius:10px;
width:320px;
}

input{
width:100%;
padding:6px;
margin-top:6px;
margin-bottom:10px;
}

button{
padding:8px 16px;
border:none;
background:#3b82f6;
color:white;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>7v7 Match Ratings</h1>

<div class="field" id="field"></div>

<div class="modal" id="modal">
<div class="modalBox">

<h2 id="pName"></h2>

<div id="viewStats"></div>

<div id="editStats" style="display:none">

Name
<input id="editName">

Rating
<input id="editRating" type="number" step="0.1">

Goals
<input id="editGoals" type="number">

Assists
<input id="editAssists" type="number">

<button onclick="savePlayer()">Save</button>

</div>

<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

let admin=false
const password="soccer123"

const players=[

{name:"GK A",rating:7.4,goals:0,assists:0,x:320,y:900},

{name:"LB A",rating:7.8,goals:0,assists:1,x:120,y:740},
{name:"CB A",rating:7.1,goals:0,assists:0,x:320,y:760},
{name:"RB A",rating:7.0,goals:0,assists:0,x:520,y:740},

{name:"LM A",rating:8.3,goals:1,assists:1,x:180,y:560},
{name:"RM A",rating:8.1,goals:0,assists:2,x:460,y:560},

{name:"ST A",rating:9.2,goals:2,assists:0,x:320,y:420},

{name:"GK B",rating:6.8,goals:0,assists:0,x:320,y:60},

{name:"LB B",rating:7.3,goals:0,assists:0,x:120,y:200},
{name:"CB B",rating:7.0,goals:0,assists:0,x:320,y:180},
{name:"RB B",rating:6.9,goals:0,assists:0,x:520,y:200},

{name:"LM B",rating:7.5,goals:0,assists:1,x:180,y:380},
{name:"RM B",rating:7.7,goals:1,assists:0,x:460,y:380},

{name:"ST B",rating:8.6,goals:1,assists:0,x:320,y:520}

]

const field=document.getElementById("field")

function ratingColor(r){
if(r>=9)return"#16a34a"
if(r>=8)return"#22c55e"
if(r>=7)return"#eab308"
if(r>=6)return"#f97316"
return"#dc2626"
}

function render(){

field.innerHTML=""

players.forEach((p,i)=>{

let div=document.createElement("div")

div.className="player"

div.style.left=p.x+"px"
div.style.top=p.y+"px"

div.style.background=ratingColor(p.rating)

div.innerHTML=`
<div>${p.name}</div>
<div class="rating">${p.rating}</div>
`

div.onclick=()=>openPlayer(i)

field.appendChild(div)

})

}

let current=null

function openPlayer(i){

current=i
let p=players[i]

document.getElementById("pName").innerText=p.name

document.getElementById("viewStats").innerHTML=`
Goals: ${p.goals}<br>
Assists: ${p.assists}<br>
Rating: ${p.rating}
`

if(admin){

document.getElementById("editStats").style.display="block"

editName.value=p.name
editRating.value=p.rating
editGoals.value=p.goals
editAssists.value=p.assists

}else{

document.getElementById("editStats").style.display="none"

}

modal.style.display="flex"

}

function savePlayer(){

let p=players[current]

p.name=editName.value
p.rating=parseFloat(editRating.value)
p.goals=parseInt(editGoals.value)
p.assists=parseInt(editAssists.value)

render()
closeModal()

}

function closeModal(){
modal.style.display="none"
}

document.addEventListener("keydown",e=>{

if(e.shiftKey && e.key==="E"){

let input=prompt("Admin Password")

if(input===password){

admin=true
alert("Edit Mode Enabled")

}else{

alert("Wrong password")

}

}

})

render()

</script>

</body>
</html>
