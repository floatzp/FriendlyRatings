<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>7v7 Match Ratings</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.header{
display:flex;
justify-content:center;
gap:20px;
margin:15px;
font-size:22px;
font-weight:bold;
}

.field{
width:700px;
height:1000px;
margin:auto;
position:relative;
background:#2f9e44;
border:5px solid white;
border-radius:8px;
}

/* halfway line */
.field:before{
content:"";
position:absolute;
top:50%;
width:100%;
height:3px;
background:white;
}

/* center circle */
.centerCircle{
position:absolute;
width:160px;
height:160px;
border:3px solid white;
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* penalty boxes */
.boxTop{
position:absolute;
width:300px;
height:120px;
border:3px solid white;
left:50%;
transform:translateX(-50%);
top:0;
}

.boxBottom{
position:absolute;
width:300px;
height:120px;
border:3px solid white;
left:50%;
transform:translateX(-50%);
bottom:0;
}

/* 6 yard boxes */
.sixTop{
position:absolute;
width:150px;
height:60px;
border:3px solid white;
left:50%;
transform:translateX(-50%);
top:0;
}

.sixBottom{
position:absolute;
width:150px;
height:60px;
border:3px solid white;
left:50%;
transform:translateX(-50%);
bottom:0;
}

/* players */

.player{
position:absolute;
width:70px;
text-align:center;
cursor:pointer;
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
border:3px solid white;
background-size:cover;
background-position:center;
margin:auto;
}

.rating{
margin-top:4px;
font-size:13px;
font-weight:bold;
padding:2px 6px;
border-radius:4px;
display:inline-block;
}

.event{
font-size:14px;
margin-top:2px;
}

.card{
position:absolute;
top:-8px;
right:-5px;
font-size:16px;
}

/* modal */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
align-items:center;
justify-content:center;
}

.box{
background:#1e293b;
padding:20px;
border-radius:8px;
width:300px;
}

input{
width:100%;
margin:6px 0;
padding:6px;
}

button{
margin-top:8px;
padding:7px 12px;
background:#3b82f6;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<span id="teamA">Team A</span>
<span id="score">0 - 0</span>
<span id="teamB">Team B</span>
</div>

<div class="field" id="field">

<div class="centerCircle"></div>
<div class="boxTop"></div>
<div class="boxBottom"></div>
<div class="sixTop"></div>
<div class="sixBottom"></div>

</div>

<div class="modal" id="modal">
<div class="box">

<h2 id="pName"></h2>

<div id="viewStats"></div>

<div id="editArea" style="display:none">

Avatar URL
<input id="editAvatar">

Name
<input id="editName">

Rating
<input id="editRating" type="number" step="0.1">

Goals (⚽)
<input id="editGoals" type="number">

Assists (🅰️)
<input id="editAssists" type="number">

Yellow Card
<input id="editYellow" type="checkbox">

Red Card
<input id="editRed" type="checkbox">

<button onclick="savePlayer()">Save</button>

</div>

<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

const password="soccer123"
let admin=false

let players=[

{name:"GK A",rating:7.4,x:320,y:900,avatar:"",goals:0,assists:0,yellow:false,red:false},

{name:"DEF A1",rating:7.2,x:150,y:750,avatar:"",goals:0,assists:0,yellow:false,red:false},
{name:"DEF A2",rating:7.0,x:320,y:760,avatar:"",goals:0,assists:0,yellow:false,red:false},
{name:"DEF A3",rating:7.1,x:500,y:750,avatar:"",goals:0,assists:0,yellow:false,red:false},

{name:"MID A1",rating:8.2,x:220,y:560,avatar:"",goals:1,assists:0,yellow:false,red:false},
{name:"MID A2",rating:8.1,x:420,y:560,avatar:"",goals:0,assists:1,yellow:false,red:false},

{name:"ST A",rating:9.0,x:320,y:420,avatar:"",goals:2,assists:0,yellow:false,red:false},

{name:"GK B",rating:6.8,x:320,y:40,avatar:"",goals:0,assists:0,yellow:false,red:false},

{name:"DEF B1",rating:7.3,x:150,y:200,avatar:"",goals:0,assists:0,yellow:false,red:false},
{name:"DEF B2",rating:7.0,x:320,y:180,avatar:"",goals:0,assists:0,yellow:false,red:false},
{name:"DEF B3",rating:6.9,x:500,y:200,avatar:"",goals:0,assists:0,yellow:false,red:false},

{name:"MID B1",rating:7.8,x:220,y:380,avatar:"",goals:0,assists:1,yellow:false,red:false},
{name:"MID B2",rating:7.9,x:420,y:380,avatar:"",goals:1,assists:0,yellow:false,red:false},

{name:"ST B",rating:8.6,x:320,y:520,avatar:"",goals:1,assists:0,yellow:false,red:false}

]

function ratingColor(r){

if(r>=9)return"#16a34a"
if(r>=8)return"#22c55e"
if(r>=7)return"#eab308"
if(r>=6)return"#f97316"
return"#dc2626"

}

const field=document.getElementById("field")

function render(){

field.querySelectorAll(".player").forEach(p=>p.remove())

players.forEach((p,i)=>{

let div=document.createElement("div")

div.className="player"

div.style.left=p.x+"px"
div.style.top=p.y+"px"

let card=""

if(p.red)card="🟥"
else if(p.yellow)card="🟨"

let events=""
events+="⚽".repeat(p.goals)
events+="🅰️".repeat(p.assists)

div.innerHTML=`

<div class="avatar" style="background-image:url('${p.avatar}')"></div>

<div class="card">${card}</div>

<div class="event">${events}</div>

<div class="rating" style="background:${ratingColor(p.rating)}">${p.rating}</div>

`

div.onclick=()=>openPlayer(i)

field.appendChild(div)

})

}

let current=null

function openPlayer(i){

current=i
let p=players[i]

pName.innerText=p.name

viewStats.innerHTML=`
Goals: ${p.goals}<br>
Assists: ${p.assists}<br>
Rating: ${p.rating}
`

if(admin){

editArea.style.display="block"

editName.value=p.name
editRating.value=p.rating
editAvatar.value=p.avatar
editGoals.value=p.goals
editAssists.value=p.assists
editYellow.checked=p.yellow
editRed.checked=p.red

}else{

editArea.style.display="none"

}

modal.style.display="flex"

}

function savePlayer(){

let p=players[current]

p.name=editName.value
p.rating=parseFloat(editRating.value)
p.avatar=editAvatar.value
p.goals=parseInt(editGoals.value)
p.assists=parseInt(editAssists.value)
p.yellow=editYellow.checked
p.red=editRed.checked

render()
closeModal()

}

function closeModal(){
modal.style.display="none"
}

document.addEventListener("keydown",e=>{

if(e.shiftKey && e.key==="E"){

let pass=prompt("Admin password")

if(pass===password){

admin=true
alert("Edit mode enabled")

}

}

})

render()

</script>

</body>
</html>
```
